<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Chikitsa Sahayak - Visceral & Blood Diagnostic Assistant</title>
    
    <!-- Home screen and shortcut branding icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/apple-touch-icon-v2.jpg" />
    <link rel="shortcut icon" href="/apple-touch-icon-v2.jpg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-v2.jpg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-v2.jpg" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-v2.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.jpg" />
    <script>
      (function() {
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = '/apple-touch-icon-v2.jpg';
        img.onload = function() {
          try {
            var canvas = document.createElement('canvas');
            canvas.width = 180;
            canvas.height = 180;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 180, 180);
            var dataURL = canvas.toDataURL('image/png');
            
            // Dynamic PNG override for WebKit legacy shortcut handlers
            var touchIcons = document.querySelectorAll('link[rel="apple-touch-icon"]');
            touchIcons.forEach(function(el) {
              el.setAttribute('href', dataURL);
            });
          } catch (e) {
            console.warn('Dynamic apple-touch-icon PNG conversion deferred:', e);
          }
        };
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chikitsa Sahayak" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
